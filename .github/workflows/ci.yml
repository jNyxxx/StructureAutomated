name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint, type, test, migration smoke)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: local_dev_password
          POSTGRES_DB: automatedstructure
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app_user -d automatedstructure"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Black (format check)
        run: black --check .
      - name: Mypy (type check)
        run: mypy app
      - name: Pytest
        run: pytest
      # Step-level DATABASE_URL so the unit tests above run DB-less (and exercise
      # the "not configured" readiness path), while this step verifies the
      # extensions migration is applyable and reversible against real Postgres.
      - name: Migration smoke (alembic up / down / up)
        env:
          DATABASE_URL: postgresql+asyncpg://app_user:local_dev_password@localhost:5432/automatedstructure
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

  frontend:
    name: Frontend (lint, type, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No lockfile is committed yet (Slice 1). `npm install` is correct until a
      # package-lock.json lands; switch to `npm ci` once it does.
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
